<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>micro:bit Accel Streamer v1.3.0</title>
<style>
  :root { --bg-color: #F5F5F5; --panel-bg: #FFFFFF; --primary: #007AFF; --success: #008000; --info: #0000FF; --warning: #FF8F00; --text-dark: #000000; --text-light: #333333; }
  body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-light); margin: 0; padding: 10px; padding-bottom: 60px; overflow-x: hidden; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; margin-bottom: 5px; }
  .title { font-size: 1.1rem; font-weight: 900; color: var(--primary); }
  .top-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  #connectBtn { flex: 2; background: var(--primary); color: white; border: 2px solid white; padding: 12px; border-radius: 10px; font-weight: 900; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  #connectBtn.connected { background: #FFFFFF; color: #00C853; border: 2px solid #00C853; }
  .main-panel { background: var(--panel-bg); color: var(--text-dark); border-radius: 15px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #EEE; margin-top: 10px; }
  .chart-container { background: #FFF; border-radius: 10px; border: 1px solid #EEE; overflow: hidden; margin-top: 10px; position: relative; }
  #rawCanvas { width: 100%; height: 450px; display: block; }
  .monitor-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #FFF; border-top: 1px solid #EEE; padding: 8px 15px; font-family: monospace; font-size: 0.7rem; color: #333; display: flex; justify-content: space-between; align-items: center; }
  .label-overlay { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; border: 1px solid #EEE; }
  .legend { display: flex; gap: 15px; font-size: 0.7rem; margin-top: 5px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
  <div class="header">
    <span class="title">ACCEL ULTRA 1kHz</span>
    <div><span id="status" style="font-size:0.7rem; color:#999;">尚未連線</span></div>
  </div>
  
  <div class="top-bar">
    <button id="connectBtn">連接 micro:bit</button>
  </div>

  <div class="main-panel">
    <div class="chart-container">
        <div class="label-overlay" id="rawScaleDisplay">±8G</div>
        <canvas id="rawCanvas"></canvas>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#FF3D00;"></div>X-axis</div>
        <div class="legend-item"><div class="dot" style="background:#00E676;"></div>Y-axis</div>
        <div class="legend-item"><div class="dot" style="background:#FFAB00;"></div>Z-axis</div>
    </div>
  </div>

  <div style="padding: 15px; font-size: 0.8rem; color: #666; line-height: 1.5;">
    <li>1kHz 原生 Canvas 渲染 (零延遲)</li>
    <li>按下 micro:bit <b>按鈕 A</b> 可切換量程 (±2G, ±4G, ±8G, ±16G)</li>
    <li>按下 micro:bit <b>按鈕 B</b> 可開啟/關閉 LED 矩陣</li>
  </div>

  <div class="monitor-footer">
    <div>G: <span id="rX">0.00</span>, <span id="rY">0.00</span>, <span id="rZ">0.00</span></div>
    <div id="fpsDisplay">0 Hz</div>
  </div>

<script>
const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

let bleDevice = null;
let rxBuffer = new Uint8Array(0);
let currentScale = 8;
let packetCount = 0;
let lastFpsTime = Date.now();
let lastUIUpdateTime = 0;

const rawCanvas = document.getElementById('rawCanvas');
const ctx = rawCanvas.getContext('2d', { alpha: false });
const rawHistoryX = new Float32Array(300);
const rawHistoryY = new Float32Array(300);
const rawHistoryZ = new Float32Array(300);
let rawIdx = 0;

function drawRaw() {
    const w = rawCanvas.width = rawCanvas.clientWidth * window.devicePixelRatio;
    const h = rawCanvas.height = rawCanvas.clientHeight * window.devicePixelRatio;
    
    // 背景
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(0, 0, w, h);
    
    // 網格線
    ctx.strokeStyle = "#F0F0F0";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.fillStyle = "#999";
    ctx.font = `${10 * window.devicePixelRatio}px Arial`;
    const labels = [currentScale, currentScale/2, 0, -currentScale/2, -currentScale];
    for(let i=0; i<=4; i++) {
        let y = (h/4)*i;
        if (i === 0) y += 2; if (i === 4) y -= 2;
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.fillText(labels[i].toFixed(1)+"G", 5, y + (i===0?15:(i===4?-5:5)));
    }
    ctx.stroke();

    const midY = h/2;
    const stepX = w/300;
    const zoomY = (h/2)/currentScale;

    const drawLine = (data, color) => {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2 * window.devicePixelRatio;
        ctx.beginPath();
        for(let i=0; i<300; i++) {
            const py = midY - (data[(rawIdx + i) % 300] * zoomY);
            if(i===0) ctx.moveTo(0, py); else ctx.lineTo(i*stepX, py);
        }
        ctx.stroke();
    };

    drawLine(rawHistoryX, "#FF3D00"); // Red
    drawLine(rawHistoryY, "#00E676"); // Green
    drawLine(rawHistoryZ, "#FFAB00"); // Orange
    
    requestAnimationFrame(drawRaw);
}
requestAnimationFrame(drawRaw);

function processData(x, y, z) {
    packetCount++;
    if (Date.now() - lastFpsTime >= 1000) {
        document.getElementById('fpsDisplay').innerText = packetCount + " Hz";
        packetCount = 0;
        lastFpsTime = Date.now();
    }
    
    if (Date.now() - lastUIUpdateTime > 100) {
        document.getElementById('rX').innerText = x.toFixed(2);
        document.getElementById('rY').innerText = y.toFixed(2);
        document.getElementById('rZ').innerText = z.toFixed(2);
        lastUIUpdateTime = Date.now();
    }

    rawHistoryX[rawIdx] = x;
    rawHistoryY[rawIdx] = y;
    rawHistoryZ[rawIdx] = z;
    rawIdx = (rawIdx + 1) % 300;
}

document.getElementById('connectBtn').addEventListener('click', async () => {
    if (!navigator.bluetooth) { alert("此瀏覽器不支援 Web Bluetooth"); return; }
    if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
    
    try {
        const d = await navigator.bluetooth.requestDevice({ 
            filters:[{namePrefix:'BBC micro:bit'},{namePrefix:'MB_'}], 
            optionalServices:[SERVICE_UUID] 
        });
        bleDevice = d;
        const s = await d.gatt.connect();
        const c = await (await s.getPrimaryService(SERVICE_UUID)).getCharacteristic(CHAR_UUID);
        await c.startNotifications();
        
        document.getElementById('connectBtn').classList.add('connected');
        document.getElementById('connectBtn').innerText = '已連線 (' + d.name + ')';
        document.getElementById('status').innerText = '狀態：已連線';

        c.addEventListener('characteristicvaluechanged', (e) => {
            let data = new Uint8Array(e.target.value.buffer);
            let combined = new Uint8Array(rxBuffer.length + data.length);
            combined.set(rxBuffer);
            combined.set(data, rxBuffer.length);
            rxBuffer = combined;
            
            // 防止緩衝區過大
            if (rxBuffer.length > 128 * 10) rxBuffer = rxBuffer.slice(rxBuffer.length - 128);

            while (rxBuffer.length >= 128) {
                let packet = rxBuffer.slice(0, 128);
                rxBuffer = rxBuffer.slice(128);
                let view = new DataView(packet.buffer);
                
                // 更新量程
                currentScale = packet[120] || 8;
                document.getElementById('rawScaleDisplay').innerText = `±${currentScale}G`;
                
                // 處理 20 個採樣點
                for (let i = 0; i < 120; i += 6) {
                    let x = (view.getInt16(i, false) / 32768.0) * currentScale;
                    let y = (view.getInt16(i+2, false) / 32768.0) * currentScale;
                    let z = (view.getInt16(i+4, false) / 32768.0) * currentScale;
                    processData(x, y, z);
                }
            }
        });
    } catch (err) { 
        console.error(err);
        alert("連線失敗: " + err); 
    }
});

// 監聽連線中斷
if (bleDevice) {
    bleDevice.addEventListener('gattserverdisconnected', () => {
        document.getElementById('connectBtn').classList.remove('connected');
        document.getElementById('connectBtn').innerText = '連接 micro:bit';
        document.getElementById('status').innerText = '狀態：連線已中斷';
    });
}
</script>
</body>
</html>
