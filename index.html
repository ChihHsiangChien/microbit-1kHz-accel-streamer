  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-light); margin: 0; padding: 0; padding-bottom: 40px; overflow-x: hidden; }

<script>
// --- 全域變數 ---
const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
let bleDevice = null, rxBuffer = new Uint8Array(0), currentScale = 8;
let gravityVec = { x: 0, y: 0, z: 1 }, gMag = 1.0;
const historySize = 300, rawHistoryX = new Float32Array(historySize), rawHistoryY = new Float32Array(historySize), rawHistoryZ = new Float32Array(historySize);
let dataIdx = 0, packetCount = 0, lastFpsTime = Date.now(), lastUIUpdateTime = 0;

let isRecording = false, recordingData = [], segments = [], sessionStartTime = 0;
let recordChart = null, historyChart = null, sessionTrendChart = null;
let repAccChart = null, repVelChart = null, setTrendChart = null;
let currentDetailSetId = null;

// --- Web Worker 分析引擎 ---
const workerCode = `
self.onmessage = function(e) {
    const { data, dt, alpha, windowSize } = e.data;
    const n = data.length;
    if (n < windowSize) {
        self.postMessage({ error: "數據範圍不足以進行濾波" });
        return;
    }

    // 1. 中值濾波 (Median Filter) - 剔除突波
    const medianFiltered = new Float32Array(n);
    const half = Math.floor(windowSize / 2);
    for (let i = 0; i < n; i++) {
        const window = [];
        for (let j = -half; j <= half; j++) {
            const idx = Math.max(0, Math.min(n - 1, i + j));
            window.push(data[idx].y);
        }
        window.sort((a, b) => a - b);
        medianFiltered[i] = window[half];
    }

    // 2. 低通濾波 (EMA Filter) - 平滑曲線
    const filtered = new Float32Array(n);
    filtered[0] = medianFiltered[0];
    for (let i = 1; i < n; i++) {
        filtered[i] = alpha * medianFiltered[i] + (1 - alpha) * filtered[i - 1];
    }

    // 3. 計算峰值加速度 (Peak Acc)
    let peakAcc = 0;
    for (let i = 0; i < n; i++) {
        if (filtered[i] > peakAcc) peakAcc = filtered[i];
    }

    // 4. 計算用力率 (Peak RFD) - 五點中心差分
    let peakRFD = 0;
    for (let i = 2; i < n - 2; i++) {
        const rfd = (2 * filtered[i+2] + filtered[i+1] - filtered[i-1] - 2 * filtered[i-2]) / (10 * dt);
        if (rfd > peakRFD) peakRFD = rfd;
    }

    self.postMessage({ peakAcc, peakRFD });
};
`;
const analysisBlob = new Blob([workerCode], { type: 'application/javascript' });
const analysisWorker = new Worker(URL.createObjectURL(analysisBlob));

function init() {
    loadSegments(); initCharts(); updateHistoryUI();
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.error(e));
    }
}

function loadSegments() {
    const saved = localStorage.getItem('vbt_pro_segments');
    if (saved) { try { segments = JSON.parse(saved); } catch(e) { segments = []; } }
}

function saveSegments() { 
    try {
        segments.sort((a, b) => a.absStartTime - b.absStartTime);
        const data = JSON.stringify(segments);
        localStorage.setItem('vbt_pro_segments', data); 
        console.log("儲存成功，當前佔用容量: " + (data.length / 1024).toFixed(2) + " KB");
        return true;
    } catch (e) {
        console.error("儲存失敗:", e);
        if (e.name === 'QuotaExceededError') {
            alert("儲存空間已滿！請先到「趨勢分析」清空一些舊的歷史紀錄，特別是帶有原始資料的項目。");
        } else {
            alert("儲存時發生錯誤：" + e.message);
        }
        return false;
    }
}

function initCharts() {
    const ctxRec = document.getElementById('recordChart').getContext('2d');
    recordChart = new Chart(ctxRec, {
        type: 'line',
        data: { datasets: [{ label: '垂直 Acc (G)', data: [], borderColor: '#2196F3', borderWidth: 1.5, pointRadius: 0, fill: false, spanGaps: true }] },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: { x: { type: 'linear', title: { display: true, text: '秒' } } },
            plugins: { zoom: { zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }, pan: { enabled: true, mode: 'x' } } }
        }
    });

    // historyChart 已從 HTML 移除，不再初始化

    const ctxSet = document.getElementById('setTrendChart').getContext('2d');
    setTrendChart = new Chart(ctxSet, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Peak Acc (G)', data: [], borderColor: '#2196F3', backgroundColor: 'rgba(33, 150, 243, 0.1)', fill: true, yAxisID: 'y', tension: 0.2 },
            { label: 'Peak RFD (G/s)', data: [], borderColor: '#E91E63', fill: false, yAxisID: 'y1', tension: 0.2 }
        ]},
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { type: 'linear', position: 'left', title: { display: true, text: 'Acc (G)' } },
                y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'RFD (G/s)' } }
            }
        }
    });

    const ctxSess = document.getElementById('sessionTrendChart').getContext('2d');
    sessionTrendChart = new Chart(ctxSess, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Peak Acc (G)', data: [], borderColor: '#2196F3', backgroundColor: 'rgba(33, 150, 243, 0.1)', fill: true, yAxisID: 'y', tension: 0.2 },
            { label: 'Peak RFD (G/s)', data: [], borderColor: '#E91E63', fill: false, yAxisID: 'y1', tension: 0.2 }
        ]},
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { type: 'linear', position: 'left', title: { display: true, text: 'Acc (G)' } },
                y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'RFD (G/s)' } }
            }
        }
    });

    const ctxAcc = document.getElementById('repAccChart').getContext('2d');
    repAccChart = new Chart(ctxAcc, {
        type: 'line',
        data: { datasets: [{ label: 'Acc (G)', data: [], borderColor: '#2196F3', borderWidth: 2, pointRadius: 0, fill: false }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { type: 'linear', title: { display: true, text: '秒' } } } }
    });

    const ctxVel = document.getElementById('repVelChart').getContext('2d');
    repVelChart = new Chart(ctxVel, {
        type: 'line',
        data: { datasets: [{ label: 'Vel (m/s)', data: [], borderColor: '#4CAF50', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(76, 175, 80, 0.1)' }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { type: 'linear', title: { display: true, text: '秒' } } } }
    });
}

const rawCanvas = document.getElementById('rawCanvas'), rawCtx = rawCanvas.getContext('2d', { alpha: false });
function drawRaw() {
    if (document.getElementById('streamer').classList.contains('active')) {
        const w = rawCanvas.width = rawCanvas.clientWidth * window.devicePixelRatio, h = rawCanvas.height = rawCanvas.clientHeight * window.devicePixelRatio;
        rawCtx.fillStyle = "#FFF"; rawCtx.fillRect(0, 0, w, h);
        
        const midY = h/2, stepX = w/historySize, zoomY = (h/2)/currentScale;

        // 繪製格線與標籤
        rawCtx.strokeStyle = "#F0F0F0"; rawCtx.lineWidth = 1 * window.devicePixelRatio;
        rawCtx.fillStyle = "#AAA"; rawCtx.font = `${10 * window.devicePixelRatio}px Arial`;
        rawCtx.textAlign = "left"; rawCtx.textBaseline = "bottom";

        [currentScale, currentScale/2, 0, -currentScale/2, -currentScale].forEach(val => {
            const py = midY - (val * zoomY);
            rawCtx.beginPath(); rawCtx.moveTo(0, py); rawCtx.lineTo(w, py); rawCtx.stroke();
            if (val !== 0 || true) { // 總是顯示標籤以利辨識
                rawCtx.fillText(val.toFixed(1) + "G", 5 * window.devicePixelRatio, py - 2 * window.devicePixelRatio);
            }
        });

        const drawLine = (data, color) => {
            rawCtx.strokeStyle = color; rawCtx.lineWidth = 1.5 * window.devicePixelRatio; rawCtx.beginPath();
            for(let i=0; i<historySize; i++) {
                const py = midY - (data[(dataIdx + i) % historySize] * zoomY);
                if(i===0) rawCtx.moveTo(0, py); else rawCtx.lineTo(i*stepX, py);
            } rawCtx.stroke();
        };
        drawLine(rawHistoryX, "#FF3D00"); drawLine(rawHistoryY, "#00E676"); drawLine(rawHistoryZ, "#FFAB00");
    }
    requestAnimationFrame(drawRaw);
}
requestAnimationFrame(drawRaw);

function processData(x, y, z) {
    packetCount++;
    const now = Date.now();
    if (now - lastFpsTime >= 1000) { document.getElementById('fpsDisplay').innerText = packetCount + " Hz"; packetCount = 0; lastFpsTime = now; }
    if (now - lastUIUpdateTime > 100) {
        document.getElementById('rX').innerText = x.toFixed(1); document.getElementById('rY').innerText = y.toFixed(1); document.getElementById('rZ').innerText = z.toFixed(1);
        lastUIUpdateTime = now;
    }
    rawHistoryX[dataIdx] = x; rawHistoryY[dataIdx] = y; rawHistoryZ[dataIdx] = z;
    const pureVerticalAcc = (x * gravityVec.x + y * gravityVec.y + z * gravityVec.z) - gMag;
    if (isRecording) { recordingData.push({ x: recordingData.length * 0.001, y: pureVerticalAcc, ax: x, ay: y, az: z }); }
    dataIdx = (dataIdx + 1) % historySize;
}

// --- 定時錄製邏輯 ---
let autoRecTimer = null;
document.getElementById('startAutoRecBtn').addEventListener('click', () => {
    if (!bleDevice || !bleDevice.gatt.connected) return alert("請先連接 micro:bit");
    
    const delay = parseInt(document.getElementById('cfgDelay').value) || 0;
    const duration = parseInt(document.getElementById('cfgDuration').value) || 15;
    
    const overlay = document.getElementById('timerOverlay');
    const label = document.getElementById('timerLabel');
    const big = document.getElementById('timerBig');
    const stopBtn = document.getElementById('stopRecBtn');
    overlay.style.display = 'flex';
    stopBtn.style.display = 'none';

    let count = delay;
    if (delay > 0) {
        label.innerText = "準備中";
        big.innerText = count;
        autoRecTimer = setInterval(() => {
            count--;
            if (count > 0) {
                big.innerText = count;
            } else {
                clearInterval(autoRecTimer);
                startActualRecording(duration);
            }
        }, 1000);
    } else {
        startActualRecording(duration);
    }
});

function startActualRecording(duration) {
    const label = document.getElementById('timerLabel');
    const big = document.getElementById('timerBig');
    const stopBtn = document.getElementById('stopRecBtn');
    label.innerText = "錄製中 (自動停止剩餘)";
    stopBtn.style.display = 'flex';
    
    recordingData = []; isRecording = true; sessionStartTime = Date.now();
    let timeLeft = duration;
    big.innerText = timeLeft;

    autoRecTimer = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
            big.innerText = timeLeft;
        } else {
            stopActualRecording();
        }
    }, 1000);
}

function stopActualRecording() {
    clearInterval(autoRecTimer);
    isRecording = false;
    document.getElementById('timerOverlay').style.display = 'none';
    document.getElementById('analyzeRangeBtn').disabled = false;
    document.getElementById('saveRawSetBtn').disabled = false;
    document.getElementById('discardDataBtn').disabled = false;
    
    const displayData = [];
    for(let i=0; i<recordingData.length; i+=10) displayData.push(recordingData[i]);
    recordChart.data.datasets[0].data = displayData;
    recordChart.resetZoom(); recordChart.update('none');
}

document.getElementById('stopRecBtn').addEventListener('click', () => {

});

document.getElementById('cancelRecBtn').addEventListener('click', () => {

});

document.getElementById('analyzeRangeBtn').addEventListener('click', () => {
    const scaleX = recordChart.scales.x;
    const minT = scaleX.min, maxT = scaleX.max;
    const visibleData = recordingData.filter(d => d.x >= minT && d.x <= maxT);
    
    if (visibleData.length < 15) return alert("選取範圍太短，無法分析");

    const btn = document.getElementById('analyzeRangeBtn');
    const originalText = btn.innerText;
    btn.innerText = "分析中...";
    btn.disabled = true;

    analysisWorker.onmessage = function(e) {
        btn.innerText = originalText;
        btn.disabled = false;

        if (e.data.error) return alert(e.data.error);

        const { peakAcc, peakRFD } = e.data;
        const sessionRepCount = segments.filter(s => s.sessionId === (sessionStartTime || 0)).length;
        const defaultNote = `Rep ${sessionRepCount + 1}`;
        const note = prompt(`分析完成！\nPeak Acc: ${peakAcc.toFixed(2)}G\nPeak RFD: ${peakRFD.toFixed(0)}G/s\n\n請輸入備註:`, defaultNote) || defaultNote;
        
        const segment = { 
            id: Date.now(), 
            sessionId: sessionStartTime || Date.now(),
            absStartTime: sessionStartTime + (minT * 1000), 
            date: new Date(sessionStartTime + (minT * 1000)).toLocaleString(), 
            note, peakAcc, peakRFD, 
            timeRange: `${minT.toFixed(2)}s - ${maxT.toFixed(2)}s`,
            // 自動儲存該 Rep 的波形切片，以便隨時查看 VT 圖
            rawV: visibleData.map(d => parseFloat(d.y.toFixed(4))),
            rawX: visibleData.map(d => parseFloat((d.ax || 0).toFixed(4))),
            rawY: visibleData.map(d => parseFloat((d.ay || 0).toFixed(4))),
            rawZ: visibleData.map(d => parseFloat((d.az || 0).toFixed(4)))
        };

        segments.push(segment); 
        if (saveSegments()) {
            updateHistoryUI(); 
            renderCurrentSession(sessionStartTime);
        }
    };

    analysisWorker.postMessage({
        data: visibleData,
        dt: 0.001,
        alpha: 0.15, // 低通濾波係數
        windowSize: 7 // 中值濾波窗口
    });
});

window.saveRawSet = function() {
    if (recordingData.length === 0) return;
    const rawX = recordingData.map(d => parseFloat((d.ax || 0).toFixed(4)));
    const rawY = recordingData.map(d => parseFloat((d.ay || 0).toFixed(4)));
    const rawZ = recordingData.map(d => parseFloat((d.az || 0).toFixed(4)));
    const rawV = recordingData.map(d => parseFloat(d.y.toFixed(4)));
    const segment = {
        id: Date.now(),
        sessionId: sessionStartTime || Date.now(),
        absStartTime: sessionStartTime,
        peakAcc: 0, peakRFD: 0,
        note: "原始錄製資料",
        timeRange: `0s - ${(recordingData.length*0.001).toFixed(1)}s`,
        date: new Date().toLocaleString(),
        rawX, rawY, rawZ, rawV,

    };

};

window.exportData = function(sid_or_id) {
    const s = segments.find(x => x.id === sid_or_id || x.sessionId === sid_or_id);
    if (!s) return alert("找不到資料");
    
    if (s.isRaw) {
        // 匯出原始 1000Hz 資料 (X, Y, Z, V)
        let csvContent = "Time(s),AccX(G),AccY(G),AccZ(G),VerticalAcc(G)\n";
        if (s.rawX) {
            for (let i = 0; i < s.rawX.length; i++) {
                csvContent += `${(i * 0.001).toFixed(3)},${s.rawX[i]},${s.rawY[i]},${s.rawZ[i]},${s.rawV[i]}\n`;
            }
        } else {
            csvContent = "Time(s),VerticalAcc(G)\n";
            const data = s.rawData || [];
            for (let i = 0; i < data.length; i++) {
                csvContent += `${(i * 0.001).toFixed(3)},${data[i]}\n`;
            }
        }
        downloadCSV(csvContent, `raw_1000Hz_${new Date(s.sessionId).toISOString().slice(0,19)}.csv`);
    } else {
        // 匯出分析後的摘要資料
        let csvContent = "Note,Date,Time Range,Peak Acc(G),Peak RFD(G/s)\n";
        csvContent += `"${s.note}",${s.date},"${s.timeRange}",${s.peakAcc.toFixed(4)},${s.peakRFD.toFixed(4)}\n`;
        downloadCSV(csvContent, `analyzed_rep_${s.id}.csv`);
    }
};

function downloadCSV(content, filename) {
    const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

                id: sid, date: s.date, reps: [], 
                note: (s.note && !s.note.includes('Rep')) ? s.note : "重量訓練"
            });
        }
        setsMap.get(sid).reps.push(s);
    });

    const sets = Array.from(setsMap.values()).sort((a, b) => a.id - b.id);
    const reverseSets = [...sets].reverse();
    const historyListMain = document.getElementById('historyListMain');
    const historyListDrawer = document.getElementById('historyList');
    
    const renderSetsHTML = (set) => {
        const actualReps = set.reps.filter(r => !r.isRaw);
        if (actualReps.length === 0 && !set.reps.some(r => r.isRaw)) return ""; 

        const bestAcc = actualReps.length > 0 ? Math.max(...actualReps.map(r => r.peakAcc)) : 0;
        
        return `
        <div class="history-item" onclick="showSetDetail(${set.id})" style="flex-direction:column; align-items:stretch; gap:12px; border-left: 5px solid var(--primary); margin-bottom:15px; padding:15px; cursor:pointer;">

                        <span class="history-note" style="font-size:1.1rem; font-weight:bold;">${set.note}</span>
                        <span onclick="event.stopPropagation(); editSetNote(${set.id})" style="cursor:pointer; opacity:0.6;">✏️</span>
                    </div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:0.8rem; color:#666;">最佳表現</div>
                    <div class="history-vals" style="color:var(--primary); font-size:1.2rem;">${bestAcc.toFixed(2)}G</div>
                </div>
            </div>
            
            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap:8px;">
                ${actualReps.map((r, i) => `
                    <button onclick="event.stopPropagation(); showRepDetail(${r.id})" style="border:1px solid #DDD; background:white; border-radius:6px; padding:6px 2px; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer;">

                        <span style="font-size:0.7rem; color:var(--info);">📈 圖表</span>
                    </button>

            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px; border-top:1px solid #F0F0F0; pt:8px;">
                <div style="display:flex; gap:8px;">
                    ${set.reps.some(r => r.isRaw) ? `
                        <button onclick="event.stopPropagation(); loadToAnalyzer(${set.id})" class="btn-sm btn-info" style="font-size:0.7rem;">🔍 切分分析</button>
                        <button onclick="event.stopPropagation(); exportData(${set.id})" class="btn-sm btn-success" style="font-size:0.7rem;">📥 匯出原始 CSV</button>

window.showRepDetail = function(id) {
    const s = segments.find(x => x.id === id); if (!s) return;
    const sid = s.sessionId;
    
    // 優先從 Rep 自身儲存的切片中讀取波形
    let accData = s.rawV || s.rawData;
    
    // 如果 Rep 沒存波形 (舊資料)，才嘗試從該 Session 的原始大檔中提取
    if (!accData || accData.length === 0) {
        const rawSeg = segments.find(x => x.sessionId === sid && x.isRaw);
        if (rawSeg) {
            const parts = s.timeRange.replace('s','').split(' - ');
            const startT = parseFloat(parts[0]), endT = parseFloat(parts[1]);
            const startIdx = Math.floor(startT * 1000), endIdx = Math.floor(endT * 1000);
            const source = rawSeg.rawV || rawSeg.rawData;
            if (source) {
                accData = source.slice(startIdx, endIdx);
            }
        }
    }
    
    if (!accData || accData.length === 0) {
        return alert("找不到該 Rep 的波形數據，無法顯示 VT 圖。");
    }
    
    // 如果沒找到 raw，至少顯示當前點 (雖然不準)
    if (accData.length === 0) return alert("此項目缺少原始加速度數據，無法產生 v-t 圖。請確保錄製後有點擊「儲存原始資料」。");

    document.getElementById('repDetailTitle').innerText = `Rep 細節: ${s.note}`;
    document.getElementById('detailPeakAcc').innerText = s.peakAcc.toFixed(2) + " G";
    
    // --- 速度積分運算 (含漂移修正) ---
    const dt = 0.001; // 1000Hz
    const n = accData.length;
    
    // 1. 基準校正 (Baseline Removal): 取前 30ms 平均作為零點
    let baseline = 0; const baseN = Math.min(30, n);
    for(let i=0; i<baseN; i++) baseline += accData[i];
    baseline /= baseN;
    
    const correctedAcc = accData.map(a => (a - baseline) * 9.81); // 轉為 m/s^2
    
    // 2. 積分
    let vel = new Float32Array(n);
    let currentV = 0;
    for(let i=0; i<n; i++) {
        currentV += correctedAcc[i] * dt;
        vel[i] = currentV;
    }
    
    // 3. 線性漂移修正 (Linear Drift Correction): 強制終點速度為 0
    const vend = vel[n-1];
    for(let i=0; i<n; i++) {
        vel[i] -= vend * (i / (n-1));
    }
    
    let peakVel = 0; vel.forEach(v => { if(v > peakVel) peakVel = v; });
    document.getElementById('detailPeakVel').innerText = peakVel.toFixed(2) + " m/s";

    // 更新圖表
    repAccChart.data.datasets[0].data = accData.map((a, i) => ({ x: i*dt, y: a }));
    repAccChart.update('none');
    
    repVelChart.data.datasets[0].data = Array.from(vel).map((v, i) => ({ x: i*dt, y: v }));
    repVelChart.update('none');

    // 設定按鈕行為
    document.getElementById('detailEditNoteBtn').onclick = () => editNote(id);
    document.getElementById('detailDeleteBtn').onclick = () => deleteSegment(id, true);

    const overlay = document.getElementById('repDetailOverlay');
    overlay.style.display = 'block';
    setTimeout(() => document.body.classList.add('drawer-active'), 10);
};

window.closeRepDetail = function() {
    const repOverlay = document.getElementById('repDetailOverlay');
    const setOverlay = document.getElementById('setDetailOverlay');
    
    repOverlay.style.display = 'none';
    // 只有當組細節也沒開時，才徹底移除背景遮罩與 active 狀態
    if (setOverlay.style.display !== 'block') {
        document.body.classList.remove('drawer-active');
    }
};

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
    if(!confirm("確定清空所有歷史？")) return;
    segments = []; saveSegments(); updateHistoryUI(); document.getElementById('currentSessionList').innerHTML = "";
});

// --- Tab & BT ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab, .content-section').forEach(el => el.classList.remove('active'));
    tab.classList.add('active'); 
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

document.getElementById('calibrateBtn').addEventListener('click', () => {
    let avgX=0, avgY=0, avgZ=0; for(let i=0; i<50; i++){ const idx=(dataIdx-i+historySize)%historySize; avgX+=rawHistoryX[idx]; avgY+=rawHistoryY[idx]; avgZ+=rawHistoryZ[idx]; }
    avgX/=50; avgY/=50; avgZ/=50; gMag = Math.sqrt(avgX**2+avgY**2+avgZ**2); gravityVec = { x:avgX/gMag, y:avgY/gMag, z:avgZ/gMag }; alert("校準完成");
});

document.getElementById('connectBtn').addEventListener('click', async () => {
    if (!navigator.bluetooth) return alert("不支援 Web Bluetooth");
    try {
        const d = await navigator.bluetooth.requestDevice({ 
            filters:[{namePrefix:'BBC micro:bit'},
            {namePrefix:'MB_'}], optionalServices:[SERVICE_UUID] 

            //acceptAllDevices: true,
            //optionalServices: [SERVICE_UUID] // 注意：使用 acceptAllDevices 時，必須把 UUID 放在這裡
            
        });

        bleDevice = d; const s = await d.gatt.connect(); const c = await (await s.getPrimaryService(SERVICE_UUID)).getCharacteristic(CHAR_UUID);
        await c.startNotifications();
        
        const statusEl = document.getElementById('status');
        statusEl.innerText = '已連線: ' + d.name;
        statusEl.style.color = 'var(--success)';
        statusEl.style.fontWeight = 'bold';

        d.addEventListener('gattserverdisconnected', () => {
            statusEl.innerText = '連線已中斷';
            statusEl.style.color = 'var(--danger)';
            document.getElementById('connectBtn').innerText = '重新連接 micro:bit';
            document.getElementById('connectBtn').classList.remove('connected');
        });

        document.getElementById('connectBtn').classList.add('connected'); document.getElementById('connectBtn').innerText = '已連線';
        c.addEventListener('characteristicvaluechanged', (e) => {
            let data = new Uint8Array(e.target.value.buffer);
            let combined = new Uint8Array(rxBuffer.length + data.length);
            combined.set(rxBuffer); combined.set(data, rxBuffer.length); rxBuffer = combined;
            if (rxBuffer.length > 2560) rxBuffer = rxBuffer.slice(rxBuffer.length - 128);
            while (rxBuffer.length >= 128) {
                let packet = rxBuffer.slice(0, 128); rxBuffer = rxBuffer.slice(128);
                let view = new DataView(packet.buffer); currentScale = packet[120] || 8;
                for (let i = 0; i < 120; i += 6) { processData((view.getInt16(i,false)/32768.0)*currentScale, (view.getInt16(i+2,false)/32768.0)*currentScale, (view.getInt16(i+4,false)/32768.0)*currentScale); }
            }
        });
    } catch (err) { alert(err); }
});

init();
</script>
