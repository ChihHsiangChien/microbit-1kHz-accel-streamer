<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<!-- PWA & Icon Tags -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007AFF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VBT Pro">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">

<title>micro:bit VBT Pro v2.7.0</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
<style>
  :root { --bg-color: #F5F5F5; --panel-bg: #FFFFFF; --primary: #007AFF; --success: #008000; --info: #0000FF; --warning: #FF8F00; --danger: #FF3B30; --text-dark: #000000; --text-light: #333333; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-light); margin: 0; padding: 0; padding-bottom: 40px; overflow-x: hidden; }
  
  .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #FFF; border-bottom: 1px solid #EEE; position: sticky; top: 0; z-index: 100; }
  .title { font-size: 1.1rem; font-weight: 900; color: var(--primary); }
  
  .tabs { display: flex; background: #FFF; border-bottom: 1px solid #EEE; position: sticky; top: 45px; z-index: 99; }
  .tab { flex: 1; text-align: center; padding: 12px; font-weight: bold; color: #999; cursor: pointer; border-bottom: 3px solid transparent; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  
  .content-section { display: none; padding: 10px; }
  .content-section.active { display: block; }

  .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn:active { opacity: 0.7; }
  .btn:disabled { background: #CCC !important; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-warning { background: var(--warning); color: white; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-info { background: var(--info); color: white; }
  .btn-sm { padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; }

  .main-panel { background: var(--panel-bg); border-radius: 15px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #EEE; margin-bottom: 15px; }
  .chart-container { background: #FFF; border-radius: 10px; border: 1px solid #EEE; overflow: hidden; position: relative; height: 320px; }
  
  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .full-width { grid-column: span 2; }

  .config-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #EEE; padding: 8px 12px; border-radius: 10px; }
  .config-row label { font-size: 0.8rem; font-weight: bold; color: #666; flex: 1; }
  .config-row input { width: 60px; border: none; padding: 5px; border-radius: 5px; text-align: center; font-weight: bold; }

  .timer-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
  .timer-big { font-size: 8rem; font-weight: 900; margin-bottom: 20px; }
  .timer-label { font-size: 1.5rem; font-weight: bold; }

  .history-item { background: #FFF; padding: 12px; border-radius: 10px; border: 1px solid #EEE; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
  .history-info { display: flex; flex-direction: column; flex: 1; }
  .history-note { font-weight: bold; font-size: 0.95rem; color: var(--primary); text-decoration: underline; cursor: pointer; }
  .history-vals { font-size: 0.9rem; font-weight: 900; }

  .monitor-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #FFF; border-top: 1px solid #EEE; padding: 5px 15px; font-family: monospace; font-size: 0.65rem; color: #333; display: flex; justify-content: space-between; align-items: center; z-index: 100; height: 30px; }
  
  .instruction { font-size: 0.75rem; color: #666; margin-bottom: 10px; line-height: 1.4; background: #FFFBE6; padding: 8px; border-radius: 8px; border: 1px solid #FFE58F; }
  
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .summary-card { background: #f8f9fa; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
  .summary-label { font-size: 0.6rem; color: #888; display: block; }
  .summary-val { font-size: 0.9rem; font-weight: bold; color: var(--primary); }
</style>
</head>
<body>
  <!-- Timer Overlay -->
  <div id="timerOverlay" class="timer-overlay">
    <div id="timerLabel" class="timer-label">準備中</div>
    <div id="timerBig" class="timer-big">3</div>
    <button id="cancelRecBtn" class="btn btn-danger">取消</button>
  </div>

  <div class="header">
    <span class="title">ACCEL VBT PRO</span>
    <div><span id="status" style="font-size:0.7rem; color:#999;">尚未連線</span></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="streamer">即時串流</div>
    <div class="tab" data-tab="recorder">定時錄製</div>
    <div class="tab" data-tab="history">趨勢分析</div>
  </div>
  
  <!-- Tab 1: Streamer -->
  <div id="streamer" class="content-section active">
    <div class="top-bar" style="display:flex; gap:8px; margin-bottom:10px;">
      <button id="connectBtn" class="btn btn-primary" style="flex:1;">連接 micro:bit</button>
      <button id="calibrateBtn" class="btn btn-warning" style="flex:1;">重力校準</button>
    </div>
    <div class="main-panel">
      <div class="chart-container" style="height: 250px;"><canvas id="rawCanvas"></canvas></div>
    </div>
  </div>

  <!-- Tab 2: Recorder -->
  <div id="recorder" class="content-section">
    <div class="main-panel" style="padding: 15px;">
        <div class="config-row">
            <label>延遲開始 (準備時間)</label>
            <input type="number" id="cfgDelay" value="3" min="0">秒
        </div>
        <div class="config-row">
            <label>錄製時長 (自動停止)</label>
            <input type="number" id="cfgDuration" value="15" min="5" max="60">秒
        </div>
        <button id="startAutoRecBtn" class="btn btn-danger full-width" style="margin-top:5px; height:50px;">🚀 開始定時錄製</button>
    </div>

    <div class="controls">
        <button id="analyzeRangeBtn" class="btn btn-info full-width" disabled>🔍 分析圖表當前範圍 (1000Hz)</button>
    </div>

    <div class="main-panel">
        <div class="chart-container"><canvas id="recordChart"></canvas></div>
    </div>
    
    <div id="currentSessionList"></div>
  </div>

  <!-- Tab 3: History -->
  <div id="history" class="content-section">
    <div class="summary-grid">
        <div class="summary-card"><span class="summary-label">平均 Acc</span><span id="sumAvgAcc" class="summary-val">--</span></div>
        <div class="summary-card"><span class="summary-label">平均 RFD</span><span id="sumAvgRFD" class="summary-val">--</span></div>
        <div class="summary-card"><span class="summary-label">疲勞損耗</span><span id="sumFatigue" class="summary-val">--</span></div>
    </div>
    <div class="main-panel">
        <div class="chart-container" style="height: 280px;"><canvas id="historyChart"></canvas></div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin: 10px 0;">
        <span style="font-weight:bold; font-size:0.85rem;">歷史記錄</span>
        <button id="clearHistoryBtn" class="btn btn-danger btn-sm">清空</button>
    </div>
    <div id="historyList"></div>
  </div>

  <div class="monitor-footer">
    <div>G: <span id="rX">0.0</span>, <span id="rY">0.0</span>, <span id="rZ">0.0</span></div>
    <div style="display:flex; gap:10px;">
        <span id="fpsDisplay">0 Hz</span>
        <span style="color:#AAA; font-weight:bold;">v2.7.0</span>
    </div>
  </div>

<script>
// --- 全域變數 ---
const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
let bleDevice = null, rxBuffer = new Uint8Array(0), currentScale = 8;
let gravityVec = { x: 0, y: 0, z: 1 }, gMag = 1.0;
const historySize = 300, rawHistoryX = new Float32Array(historySize), rawHistoryY = new Float32Array(historySize), rawHistoryZ = new Float32Array(historySize);
let dataIdx = 0, packetCount = 0, lastFpsTime = Date.now(), lastUIUpdateTime = 0;

let isRecording = false, recordingData = [], segments = [], sessionStartTime = 0;
let recordChart = null, historyChart = null;

function init() {
    loadSegments(); initCharts(); updateHistoryUI();
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.error(e));
    }
}

function loadSegments() {
    const saved = localStorage.getItem('vbt_pro_segments');
    if (saved) { try { segments = JSON.parse(saved); } catch(e) { segments = []; } }
}

function saveSegments() { 
    segments.sort((a, b) => a.absStartTime - b.absStartTime);
    localStorage.setItem('vbt_pro_segments', JSON.stringify(segments)); 
}

function initCharts() {
    const ctxRec = document.getElementById('recordChart').getContext('2d');
    recordChart = new Chart(ctxRec, {
        type: 'line',
        data: { datasets: [{ label: '垂直 Acc (G)', data: [], borderColor: '#2196F3', borderWidth: 1.5, pointRadius: 0, fill: false, spanGaps: true }] },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: { x: { type: 'linear', title: { display: true, text: '秒' } } },
            plugins: { zoom: { zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }, pan: { enabled: true, mode: 'x' } } }
        }
    });

    const ctxHist = document.getElementById('historyChart').getContext('2d');
    historyChart = new Chart(ctxHist, {
        data: { labels: [], datasets: [
            { type: 'bar', label: 'Peak Acc (G)', data: [], backgroundColor: 'rgba(33, 150, 243, 0.6)', yAxisID: 'y' },
            { type: 'line', label: 'Acc 趨勢', data: [], borderColor: '#2196F3', borderWidth: 2, tension: 0.3, pointRadius: 4, fill: false, yAxisID: 'y' },
            { type: 'line', label: 'Peak RFD (G/s)', data: [], borderColor: '#E91E63', borderWidth: 2, tension: 0.3, pointRadius: 4, fill: false, yAxisID: 'y1' }
        ]},
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { type: 'linear', position: 'left', title: { display: true, text: 'Acc (G)' } },
                y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: 'RFD (G/s)' } }
            }
        }
    });
}

const rawCanvas = document.getElementById('rawCanvas'), rawCtx = rawCanvas.getContext('2d', { alpha: false });
function drawRaw() {
    if (document.getElementById('streamer').classList.contains('active')) {
        const w = rawCanvas.width = rawCanvas.clientWidth * window.devicePixelRatio, h = rawCanvas.height = rawCanvas.clientHeight * window.devicePixelRatio;
        rawCtx.fillStyle = "#FFF"; rawCtx.fillRect(0, 0, w, h);
        const midY = h/2, stepX = w/historySize, zoomY = (h/2)/currentScale;
        const drawLine = (data, color) => {
            rawCtx.strokeStyle = color; rawCtx.lineWidth = 1.5 * window.devicePixelRatio; rawCtx.beginPath();
            for(let i=0; i<historySize; i++) {
                const py = midY - (data[(dataIdx + i) % historySize] * zoomY);
                if(i===0) rawCtx.moveTo(0, py); else rawCtx.lineTo(i*stepX, py);
            } rawCtx.stroke();
        };
        drawLine(rawHistoryX, "#FF3D00"); drawLine(rawHistoryY, "#00E676"); drawLine(rawHistoryZ, "#FFAB00");
    }
    requestAnimationFrame(drawRaw);
}
requestAnimationFrame(drawRaw);

function processData(x, y, z) {
    packetCount++;
    const now = Date.now();
    if (now - lastFpsTime >= 1000) { document.getElementById('fpsDisplay').innerText = packetCount + " Hz"; packetCount = 0; lastFpsTime = now; }
    if (now - lastUIUpdateTime > 100) {
        document.getElementById('rX').innerText = x.toFixed(1); document.getElementById('rY').innerText = y.toFixed(1); document.getElementById('rZ').innerText = z.toFixed(1);
        lastUIUpdateTime = now;
    }
    rawHistoryX[dataIdx] = x; rawHistoryY[dataIdx] = y; rawHistoryZ[dataIdx] = z;
    const pureVerticalAcc = (x * gravityVec.x + y * gravityVec.y + z * gravityVec.z) - gMag;
    if (isRecording) { recordingData.push({ x: recordingData.length * 0.001, y: pureVerticalAcc }); }
    dataIdx = (dataIdx + 1) % historySize;
}

// --- 定時錄製邏輯 ---
let autoRecTimer = null;
document.getElementById('startAutoRecBtn').addEventListener('click', () => {
    if (!bleDevice || !bleDevice.gatt.connected) return alert("請先連接 micro:bit");
    
    const delay = parseInt(document.getElementById('cfgDelay').value) || 0;
    const duration = parseInt(document.getElementById('cfgDuration').value) || 15;
    
    const overlay = document.getElementById('timerOverlay');
    const label = document.getElementById('timerLabel');
    const big = document.getElementById('timerBig');
    overlay.style.display = 'flex';

    let count = delay;
    if (delay > 0) {
        label.innerText = "準備中";
        big.innerText = count;
        autoRecTimer = setInterval(() => {
            count--;
            if (count > 0) {
                big.innerText = count;
            } else {
                clearInterval(autoRecTimer);
                startActualRecording(duration);
            }
        }, 1000);
    } else {
        startActualRecording(duration);
    }
});

function startActualRecording(duration) {
    const label = document.getElementById('timerLabel');
    const big = document.getElementById('timerBig');
    label.innerText = "錄製中 (自動停止剩餘)";
    
    recordingData = []; isRecording = true; sessionStartTime = Date.now();
    let timeLeft = duration;
    big.innerText = timeLeft;

    autoRecTimer = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
            big.innerText = timeLeft;
        } else {
            stopActualRecording();
        }
    }, 1000);
}

function stopActualRecording() {
    clearInterval(autoRecTimer);
    isRecording = false;
    document.getElementById('timerOverlay').style.display = 'none';
    document.getElementById('analyzeRangeBtn').disabled = false;
    
    const displayData = [];
    for(let i=0; i<recordingData.length; i+=10) displayData.push(recordingData[i]);
    recordChart.data.datasets[0].data = displayData;
    recordChart.resetZoom(); recordChart.update('none');
}

document.getElementById('cancelRecBtn').addEventListener('click', () => {
    clearInterval(autoRecTimer);
    isRecording = false;
    document.getElementById('timerOverlay').style.display = 'none';
});

// --- 分析與 UI ---
document.getElementById('analyzeRangeBtn').addEventListener('click', () => {
    const scaleX = recordChart.scales.x;
    const minT = scaleX.min, maxT = scaleX.max;
    const visibleData = recordingData.filter(d => d.x >= minT && d.x <= maxT);
    if (visibleData.length < 10) return alert("範圍太小");

    let peakAcc = 0; visibleData.forEach(d => { if(d.y > peakAcc) peakAcc = d.y; });
    let peakRFD = 0; const dt = 0.001;
    const startIdx = Math.max(2, recordingData.findIndex(d => d.x >= minT));
    const endIdx = Math.min(recordingData.length - 3, recordingData.findIndex(d => d.x >= maxT));
    if (startIdx !== -1 && endIdx !== -1) {
        for (let i = startIdx; i <= endIdx; i++) {
            const rfd = (2 * recordingData[i+2].y + recordingData[i+1].y - recordingData[i-1].y - 2 * recordingData[i-2].y) / (10 * dt);
            if (Math.abs(rfd) > peakRFD) peakRFD = Math.abs(rfd);
        }
    }
    const defaultNote = `Rep ${segments.length + 1}`;
    const note = prompt("輸入備註:", defaultNote) || defaultNote;
    const segment = { id: Date.now(), absStartTime: sessionStartTime + (minT * 1000), date: new Date(sessionStartTime + (minT * 1000)).toLocaleString(), note, peakAcc, peakRFD, timeRange: `${minT.toFixed(2)}s - ${maxT.toFixed(2)}s` };
    segments.push(segment); saveSegments(); updateHistoryUI(); renderCurrentSession(sessionStartTime);
});

function renderCurrentSession(startTime) {
    const sessionReps = segments.filter(s => s.absStartTime >= startTime);
    const list = document.getElementById('currentSessionList');
    list.innerHTML = sessionReps.slice().reverse().map(s => `
        <div class="history-item">
            <div class="history-info"><span class="history-note" onclick="editNote(${s.id})">${s.note}</span><span style="font-size:0.6rem; color:#999;">${s.timeRange}</span></div>
            <div style="text-align:right;"><div class="history-vals">${s.peakAcc.toFixed(2)}G</div><button onclick="deleteSegment(${s.id}, true)" class="btn-sm btn-danger">刪除</button></div>
        </div>`).join('');
}

function updateHistoryUI() {
    const sortedSegments = [...segments].sort((a, b) => b.absStartTime - a.absStartTime);
    document.getElementById('historyList').innerHTML = sortedSegments.map(s => `
        <div class="history-item">
            <div class="history-info"><span class="history-date">${s.date}</span><span class="history-note" onclick="editNote(${s.id})">${s.note}</span><span style="font-size:0.6rem; color:#999;">${s.timeRange}</span></div>
            <div style="text-align:right;"><div class="history-vals">${s.peakAcc.toFixed(2)}G / ${s.peakRFD.toFixed(0)}</div><button onclick="deleteSegment(${s.id})" class="btn-sm btn-danger" style="margin-top:5px;">刪除</button></div>
        </div>`).join('');
    const chronoSorted = [...segments].sort((a, b) => a.absStartTime - b.absStartTime);
    if (chronoSorted.length > 0) {
        const avgAcc = chronoSorted.reduce((a, b) => a + b.peakAcc, 0) / chronoSorted.length;
        const avgRFD = chronoSorted.reduce((a, b) => a + b.peakRFD, 0) / chronoSorted.length;
        const fatigue = chronoSorted.length > 1 ? ((chronoSorted[0].peakAcc - chronoSorted[chronoSorted.length-1].peakAcc) / chronoSorted[0].peakAcc * 100) : 0;
        document.getElementById('sumAvgAcc').innerText = avgAcc.toFixed(2) + " G";
        document.getElementById('sumAvgRFD').innerText = avgRFD.toFixed(0);
        document.getElementById('sumFatigue').innerText = fatigue.toFixed(1) + "%";
    }
    historyChart.data.labels = chronoSorted.map(s => s.note);
    historyChart.data.datasets[0].data = chronoSorted.map(s => s.peakAcc);
    historyChart.data.datasets[1].data = chronoSorted.map(s => s.peakAcc);
    historyChart.data.datasets[2].data = chronoSorted.map(s => s.peakRFD);
    historyChart.update();
}

window.editNote = function(id) {
    const s = segments.find(x => x.id === id); if (!s) return;
    const newNote = prompt("修改備註:", s.note);
    if (newNote !== null) { s.note = newNote; saveSegments(); updateHistoryUI(); renderCurrentSession(sessionStartTime); }
};

window.deleteSegment = function(id, isCurrentSession = false) {
    if(!confirm("確定刪除此 Rep？")) return;
    segments = segments.filter(s => s.id !== id); saveSegments(); updateHistoryUI();
    if(isCurrentSession) renderCurrentSession(sessionStartTime);
};

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
    if(!confirm("確定清空所有歷史？")) return;
    segments = []; saveSegments(); updateHistoryUI(); document.getElementById('currentSessionList').innerHTML = "";
});

// --- Tab & BT ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab, .content-section').forEach(el => el.classList.remove('active'));
    tab.classList.add('active'); document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

document.getElementById('calibrateBtn').addEventListener('click', () => {
    let avgX=0, avgY=0, avgZ=0; for(let i=0; i<50; i++){ const idx=(dataIdx-i+historySize)%historySize; avgX+=rawHistoryX[idx]; avgY+=rawHistoryY[idx]; avgZ+=rawHistoryZ[idx]; }
    avgX/=50; avgY/=50; avgZ/=50; gMag = Math.sqrt(avgX**2+avgY**2+avgZ**2); gravityVec = { x:avgX/gMag, y:avgY/gMag, z:avgZ/gMag }; alert("校準完成");
});

document.getElementById('connectBtn').addEventListener('click', async () => {
    if (!navigator.bluetooth) return alert("不支援 Web Bluetooth");
    try {
        const d = await navigator.bluetooth.requestDevice({ filters:[{namePrefix:'BBC micro:bit'},{namePrefix:'MB_'}], optionalServices:[SERVICE_UUID] });
        bleDevice = d; const s = await d.gatt.connect(); const c = await (await s.getPrimaryService(SERVICE_UUID)).getCharacteristic(CHAR_UUID);
        await c.startNotifications();
        document.getElementById('connectBtn').classList.add('connected'); document.getElementById('connectBtn').innerText = '已連線';
        c.addEventListener('characteristicvaluechanged', (e) => {
            let data = new Uint8Array(e.target.value.buffer);
            let combined = new Uint8Array(rxBuffer.length + data.length);
            combined.set(rxBuffer); combined.set(data, rxBuffer.length); rxBuffer = combined;
            if (rxBuffer.length > 2560) rxBuffer = rxBuffer.slice(rxBuffer.length - 128);
            while (rxBuffer.length >= 128) {
                let packet = rxBuffer.slice(0, 128); rxBuffer = rxBuffer.slice(128);
                let view = new DataView(packet.buffer); currentScale = packet[120] || 8;
                for (let i = 0; i < 120; i += 6) { processData((view.getInt16(i,false)/32768.0)*currentScale, (view.getInt16(i+2,false)/32768.0)*currentScale, (view.getInt16(i+4,false)/32768.0)*currentScale); }
            }
        });
    } catch (err) { alert(err); }
});

init();
</script>
</body>
</html>
